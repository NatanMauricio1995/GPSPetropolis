<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPS Petrópolis</title>
<link rel="stylesheet" href="./leaflet.css"/>
<script src="./leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --sidebar-bg: #e8e6e0;
  --border: #e2e0d8;
  --border2: #ebe9e2;
  --text: #1c1b18;
  --text2: #3d3b36;
  --text3: #6b6860;
  --accent: #1850d4;
  --green: #15803d;
  --green-bg: #f0fdf4;
  --red: #b91c1c;
  --red-bg: #fef2f2;
  --yellow: #92400e;
  --yellow-bg: #fffbeb;
  --sidebar-w: 288px;
  --header-h: 48px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
}

[data-theme="dark"] {
  --bg: #111110;
  --surface: #1a1918;
  --surface2: #222120;
  --sidebar-bg: #1a1918;
  --border: #2e2d2a;
  --border2: #262524;
  --text: #eceae4;
  --text2: #8a8880;
  --text3: #555350;
  --accent: #5b8af8;
  --green: #22c55e;
  --green-bg: #0a1f12;
  --red: #f87171;
  --red-bg: #1f0a0a;
  --yellow: #fbbf24;
  --yellow-bg: #1a1200;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ─── Header ─────────────────────────────────── */
.header {
  height: var(--header-h); flex-shrink: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.header-brand-name { font-size: 13px; font-weight: 600; letter-spacing: -.01em; }
.header-brand-tag {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px;
  letter-spacing: .02em;
}
.theme-btn {
  width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
  color: var(--text2); border-color: var(--text3);
}
.theme-btn:hover { border-color: var(--text); color: var(--text); }
[data-theme="dark"] .theme-btn { color: #ffffff; }

/* ─── Body ───────────────────────────────────── */
.body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ─── Sidebar ────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--sidebar-bg); border-right: 1px solid var(--border);
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-inner { padding: 12px; display: flex; flex-direction: column; gap: 1px; }

.section {
  padding: 10px 0; border-bottom: 1px solid var(--border2);
}
.section:last-child { border-bottom: none; }

.section-label {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 8px;
}

/* ─── Fields ─────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
.field:last-child { margin-bottom: 0; }
.field label { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.field select, .field input[type="time"] {
  font-family: var(--mono); font-size: 12px; padding: 7px 9px;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); width: 100%;
  outline: none; transition: border-color .15s;
}
.field select:focus, .field input:focus { border-color: var(--accent); }
.field select option { background: var(--surface); }

/* ─── Vehicle ─────────────────────────────────── */
.vehicle-row { display: flex; gap: 6px; }
.vehicle-card {
  flex: 1; padding: 8px 6px; border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; text-align: center; background: var(--surface2);
  transition: all .15s; user-select: none;
}
.vehicle-card.selected {
  border-color: var(--accent); background: var(--surface);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.vehicle-icon { font-size: 18px; margin-bottom: 2px; }
.vehicle-label { font-family: var(--mono); font-size: 9px; color: var(--text2); }

/* ─── Time badge ─────────────────────────────── */
.hora-badge {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px;
  border-radius: var(--radius); font-family: var(--mono); font-size: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); margin-top: 5px; transition: all .2s;
}
.hora-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.hora-badge[data-periodo="1"] { border-color: #1e3a5f44; background: #0b133020; color: #6a90d0; }
.hora-badge[data-periodo="1"] .hora-badge-dot { background: #4a7aaf; }
.hora-badge[data-periodo="2"] { border-color: #ffd16644; background: #ffd16618; color: #b08010; }
.hora-badge[data-periodo="2"] .hora-badge-dot { background: #e0a020; }
.hora-badge[data-periodo="3"] { border-color: #ffc83d44; background: #ffc83d14; color: #9a7010; }
.hora-badge[data-periodo="3"] .hora-badge-dot { background: #d0a020; }
.hora-badge[data-periodo="4"] { border-color: #e8e0c044; background: #f8f0d010; color: var(--text2); }
.hora-badge[data-periodo="4"] .hora-badge-dot { background: var(--text3); }
.hora-badge[data-periodo="5"] { border-color: #f47c2044; background: #f47c2014; color: #c06010; }
.hora-badge[data-periodo="5"] .hora-badge-dot { background: #e07020; }
.hora-badge[data-periodo="6"] { border-color: #3b5ba544; background: #3b5ba518; color: #6080d0; }
.hora-badge[data-periodo="6"] .hora-badge-dot { background: #5070c0; }
.hora-badge[data-periodo="7"] { border-color: #0a0f1f44; background: #1e2a4718; color: #8090c0; }
.hora-badge[data-periodo="7"] .hora-badge-dot { background: #6070a0; }

/* ─── Weather ─────────────────────────────────── */
.weather-grid { display: flex; flex-direction: column; gap: 3px; }
.weather-btn {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; font-family: var(--mono); font-size: 10px;
  background: var(--surface2); color: var(--text2);
  transition: all .12s; user-select: none; position: relative;
}
.weather-btn:hover { border-color: var(--text3); color: var(--text); }
.weather-btn.selected { border-color: transparent; color: #fff; }
.weather-btn .w-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: currentColor; opacity: .5;
}
.weather-btn.selected .w-dot { opacity: 1; }

/* Rain level colors */
.weather-btn[data-id="0"].selected { background: #64a8d0; }
.weather-btn[data-id="1"].selected { background: #4e8fc0; }
.weather-btn[data-id="2"].selected { background: #3878b0; }
.weather-btn[data-id="3"].selected { background: #2260a0; }
.weather-btn[data-id="4"].selected { background: #1a4e90; }
.weather-btn[data-id="5"].selected { background: #123a70; }
.weather-btn[data-id="6"].selected { background: #0a2050; }

/* ─── Buttons ─────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 9px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius); font-family: var(--sans);
  font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: .01em;
  transition: opacity .15s, transform .1s;
}
.btn-primary:hover { opacity: .88; }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.btn-secondary {
  width: 100%; padding: 8px; background: transparent; color: var(--text2);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--text3); color: var(--text); }
.btn-secondary:disabled { opacity: .35; cursor: not-allowed; }

.speed-row {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 9px; color: var(--text3);
}
.speed-row input { flex: 1; accent-color: var(--accent); }

.step-badge {
  display: none; font-family: var(--mono); font-size: 9px; padding: 3px 8px;
  border-radius: 4px; text-align: center; color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  background: color-mix(in srgb, var(--accent) 8%, transparent);
}
.step-badge.visible { display: block; }

/* ─── Info panel ─────────────────────────────── */
.info-panel {
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 10px; background: var(--surface2); display: none;
}
.info-panel.visible { display: block; }
.info-title { font-size: 11px; font-weight: 600; margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid var(--border2); }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
.info-label { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.info-val { font-family: var(--mono); font-size: 10px; font-weight: 500; }
.info-tag {
  margin-top: 7px; padding: 5px 7px; border-radius: var(--radius);
  font-family: var(--mono); font-size: 9px;
}
.info-tag.ok { background: var(--green-bg); color: var(--green); border: 1px solid color-mix(in srgb, var(--green) 25%, transparent); }
.info-tag.warn { background: var(--yellow-bg); color: var(--yellow); border: 1px solid color-mix(in srgb, var(--yellow) 25%, transparent); }
.info-tag.err { background: var(--red-bg); color: var(--red); border: 1px solid color-mix(in srgb, var(--red) 25%, transparent); }

/* ─── Map area ───────────────────────────────── */
.map-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
#map { position: absolute; inset: 0; width: 100%; height: 100%; }

#rain-canvas {
  position: absolute; inset: 0; pointer-events: none; z-index: 500;
  opacity: 0; transition: opacity .5s;
}
#rain-canvas.active { opacity: 1; }

/* ─── Map overlays ───────────────────────────── */
.map-alert {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 700; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 8px 16px; font-family: var(--mono);
  font-size: 11px; color: var(--red); display: none; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
}
.map-alert.visible { display: block; }

#coord-display {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  z-index: 700; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 12px; font-family: var(--mono);
  font-size: 10px; color: var(--text2); display: flex; align-items: center; gap: 8px;
  pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,.1);
  white-space: nowrap; opacity: 0; transition: opacity .2s;
}
#coord-display.visible { opacity: 1; }
#coord-display .cdot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

.loader {
  position: absolute; inset: 0; z-index: 800; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,.2); backdrop-filter: blur(2px);
}
.loader.visible { display: flex; }
.loader-box {
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border); padding: 20px 28px;
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.loader-spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Legend ─────────────────────────────────── */
.legend {
  position: absolute; top: 10px; right: 10px; z-index: 600;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px 12px; font-family: var(--mono);
  font-size: 9px; display: none; flex-direction: column; gap: 5px;
}
.legend.visible { display: flex; }
.legend-title { font-size: 9px; letter-spacing: .08em; color: var(--text3); margin-bottom: 2px; }
.legend-item { display: flex; align-items: center; gap: 7px; color: var(--text2); }
.legend-line { width: 20px; height: 2px; border-radius: 2px; }

/* ─── Edge status legend (always visible on map) ─── */
.edge-legend {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 600; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px; font-family: var(--mono); font-size: 9px;
  display: flex; align-items: center; gap: 12px; color: var(--text2);
  box-shadow: 0 2px 8px rgba(0,0,0,.08); pointer-events: none;
}
.edge-legend-item { display: flex; align-items: center; gap: 5px; }
.edge-legend-line { width: 16px; height: 2px; border-radius: 1px; }
.edge-legend-line.free { background: #22c55e; }
.edge-legend-line.blocked { background: #ef4444; border: none; /* dashes via gradient */
  background: repeating-linear-gradient(90deg, #ef4444 0 5px, transparent 5px 9px);
}

/* ─── Leaflet tooltip overrides ──────────────── */
.tt-wrap .leaflet-tooltip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0; box-shadow: 0 4px 16px rgba(0,0,0,.15);
  font-family: var(--mono); font-size: 10px; white-space: normal;
  min-width: 180px; pointer-events: none;
}
.tt-wrap .leaflet-tooltip::before { display: none; }

.tt-inner { padding: 9px 11px; display: flex; flex-direction: column; gap: 3px; }
.tt-head {
  font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 3px; padding-bottom: 5px;
  border-bottom: 1px solid var(--border2);
}
.tt-head.blocked { color: var(--red); }
.tt-motive { font-size: 10px; color: var(--red); font-weight: 500; margin-bottom: 1px; }
.tt-row { display: flex; justify-content: space-between; gap: 10px; }
.tt-k { color: var(--text3); font-size: 9px; }
.tt-v { font-weight: 500; color: var(--text); font-size: 10px; }
.tt-v.accent { color: var(--accent); }
.tt-tag {
  margin-top: 3px; padding: 2px 5px; border-radius: 3px; font-size: 9px;
  background: var(--red-bg); color: var(--red);
  border: 1px solid color-mix(in srgb, var(--red) 20%, transparent);
}

/* ─── Dark map tiles ─────────────────────────── */
[data-theme="dark"] .leaflet-tile {
  filter: brightness(.55) saturate(.8) hue-rotate(180deg) invert(1);
}
[data-theme="dark"] .leaflet-container { background: #111110; }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-brand">
      <div class="header-brand-dot"></div>
      <span class="header-brand-name">GPS Petrópolis</span>
      <span class="header-brand-tag">Dijkstra</span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema" id="theme-btn">☀</button>
  </header>

  <div class="body">

    <aside class="sidebar">
      <div class="sidebar-inner">

        <!-- ROTA -->
        <div class="section">
          <div class="section-label">Rota</div>
          <div class="field">
            <label>Origem</label>
            <select id="sel-origem" onchange="onSelecionarPonto()"><option value="">Carregando...</option></select>
          </div>
          <div class="field">
            <label>Destino</label>
            <select id="sel-destino" onchange="onSelecionarPonto()"><option value="">Carregando...</option></select>
          </div>
        </div>

        <!-- VEÍCULO -->
        <div class="section">
          <div class="section-label">Veículo</div>
          <div class="vehicle-row">
            <div class="vehicle-card selected" id="v-car" onclick="selectVehicle('car')">
              <div class="vehicle-icon">🚗</div>
              <div class="vehicle-label">Carro</div>
            </div>
            <div class="vehicle-card" id="v-truck" onclick="selectVehicle('truck')">
              <div class="vehicle-icon">🚚</div>
              <div class="vehicle-label">Caminhão</div>
            </div>
          </div>
        </div>

        <!-- HORÁRIO -->
        <div class="section">
          <div class="section-label">Horário de Saída</div>
          <div class="field">
            <label>Hora prevista</label>
            <input type="time" id="hora" value="08:00" oninput="onHoraChange(this.value)"/>
          </div>
          <div class="hora-badge" id="hora-badge" data-periodo="2">
            <div class="hora-badge-dot"></div>
            <span id="hora-badge-text">Pico da manhã</span>
          </div>
        </div>

        <!-- CHUVA -->
        <div class="section">
          <div class="section-label">Condição Climática</div>
          <div class="weather-grid">
            <div class="weather-btn selected" id="w-0" data-id="0" onclick="selectWeather(0)"><div class="w-dot"></div>Sem chuva</div>
            <div class="weather-btn" id="w-1" data-id="1" onclick="selectWeather(1)"><div class="w-dot"></div>Garoa</div>
            <div class="weather-btn" id="w-2" data-id="2" onclick="selectWeather(2)"><div class="w-dot"></div>Chuva fraca</div>
            <div class="weather-btn" id="w-3" data-id="3" onclick="selectWeather(3)"><div class="w-dot"></div>Chuva moderada</div>
            <div class="weather-btn" id="w-4" data-id="4" onclick="selectWeather(4)"><div class="w-dot"></div>Chuva forte</div>
            <div class="weather-btn" id="w-5" data-id="5" onclick="selectWeather(5)"><div class="w-dot"></div>Chuva muito forte</div>
            <div class="weather-btn" id="w-6" data-id="6" onclick="selectWeather(6)"><div class="w-dot"></div>Chuva extrema</div>
          </div>
        </div>

        <!-- AÇÕES -->
        <div class="section">
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn-primary" onclick="calcRota()">Calcular Rota</button>
            <button class="btn-secondary" id="btn-viz" onclick="toggleVisualizacao()" disabled>
              ◈ Modo Visualização
            </button>
            <div class="speed-row" id="speed-row" style="display:none">
              <span>Lento</span>
              <input type="range" id="speed-slider" min="50" max="1000" value="350" step="50"/>
              <span>Rápido</span>
            </div>
            <div class="step-badge" id="step-badge"></div>
          </div>
        </div>

        <!-- INFO -->
        <div class="section">
          <div class="info-panel" id="info-panel"></div>
        </div>

      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
      <canvas id="rain-canvas"></canvas>
      <div class="map-alert" id="map-alert"></div>

      <!-- Edge status indicator -->
      <div class="edge-legend" id="edge-legend">
        <div class="edge-legend-item">
          <div class="edge-legend-line free"></div>
          <span>Via livre</span>
        </div>
        <div class="edge-legend-item">
          <div class="edge-legend-line blocked"></div>
          <span>Via bloqueada</span>
        </div>
      </div>

      <div id="coord-display">
        <div class="cdot"></div>
        <span id="coord-lat">—</span>
        <span style="color:var(--border)">|</span>
        <span id="coord-lng">—</span>
      </div>

      <div class="loader" id="loader">
        <div class="loader-box">
          <div class="loader-spinner"></div>
          <span id="loader-msg">Carregando...</span>
        </div>
      </div>

      <div class="legend" id="legend">
        <div class="legend-title">LEGENDA</div>
        <div class="legend-item"><div class="legend-line" style="background:#f59e0b"></div>Explorado</div>
        <div class="legend-item"><div class="legend-line" style="background:#8b5cf6"></div>Nó visitado</div>
        <div class="legend-item"><div class="legend-line" style="background:#2563eb;height:4px"></div>Rota final</div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
const API = 'http://localhost:5000/api';
let grafo = {};
let selectedVehicle = 'car';
let selectedWeather = 0;
let mapa, layerGrafo, layerRota, layerAnimacao, layerAnimNos;
let ultimoResultado = null;
let animTimer = null;
let animRunning = false;
let rainCanvas, rainCtx, rainAnim;
let appPronto = false;

// ─── Tabelas de peso — espelham server.py / parametros.json ───
const PESO_LARGURA = { 1: 1.5, 2: 1.0, 3: 0.5 };
const PESO_FLUXO   = { 1: 0.5, 2: 1.0, 3: 1.5, 4: 2.0, 5: 2.5 };
const PESO_TIPO    = { 1: 1.0, 2: 1.5, 3: 2.0, 4: 0.5 };
const PESO_CHUVA   = { 0: 1.0, 1: 1.1, 2: 1.2, 3: 1.3, 4: 2.0, 5: 2.5, 6: 3.0 };
const PESO_HORA    = { 1: 0.9, 2: 1.8, 3: 1.2, 4: 1.4, 5: 1.3, 6: 2.0, 7: 1.0 };

const LABEL_LARGURA = { 1: 'Estreita', 2: 'Intermediária', 3: 'Larga' };
const LABEL_FLUXO   = { 1: 'Muito baixo', 2: 'Baixo', 3: 'Médio', 4: 'Alto', 5: 'Muito alto' };
const LABEL_TIPO    = { 1: 'Residencial', 2: 'Coletora', 3: 'Arterial', 4: 'Rodovia' };

const horaFaixas = [
  { id:1, inicio:'00:00', fim:'05:59', label:'Madrugada' },
  { id:2, inicio:'06:00', fim:'08:59', label:'Pico da manhã' },
  { id:3, inicio:'09:00', fim:'11:59', label:'Manhã' },
  { id:4, inicio:'12:00', fim:'13:59', label:'Almoço' },
  { id:5, inicio:'14:00', fim:'16:59', label:'Tarde' },
  { id:6, inicio:'17:00', fim:'19:59', label:'Pico da noite' },
  { id:7, inicio:'20:00', fim:'23:59', label:'Noite' },
];

const weatherCfg = [
  { chuvaId:0, drops:0,   intensity:.00, alert:'' },
  { chuvaId:1, drops:30,  intensity:.02, alert:'' },
  { chuvaId:2, drops:70,  intensity:.05, alert:'' },
  { chuvaId:3, drops:130, intensity:.10, alert:'⚠ Pista molhada' },
  { chuvaId:4, drops:220, intensity:.18, alert:'⛔ Chuva forte — reduza a velocidade' },
  { chuvaId:5, drops:300, intensity:.24, alert:'🚨 Risco de alagamento' },
  { chuvaId:6, drops:400, intensity:.32, alert:'🚨 Chuva extrema — evite sair' },
];

const veiculoId = { 'car': 1, 'truck': 2 };

// ═══════════════════════════════════════════════════════
// CÁLCULO LOCAL DE PESO E BLOQUEIO
// Replica exatamente a lógica de calcular_peso_aresta() do server.py
// ═══════════════════════════════════════════════════════
function getContexto() {
  const horaStr = document.getElementById('hora')?.value || '08:00';
  const faixa   = horaFaixas.find(f => horaStr >= f.inicio && horaStr <= f.fim) || horaFaixas[4];
  return {
    chuva:   weatherCfg[selectedWeather].chuvaId,
    veiculo: veiculoId[selectedVehicle],
    hora:    faixa.id,
  };
}

/**
 * Calcula peso e bloqueio de uma aresta.
 * Retorna { bloqueado: bool, motivo: str, peso: float, pesoFmt: str }
 *
 * FÓRMULA (idêntica ao server.py):
 *   peso = dist * (1*wL + 2*wH + 3*wT + 4*wF + 5*wC) / 15
 *          * (wL/10) * (wT/10) * (wF/10)
 *
 * Para o tooltip (sem distância real em radianos no cliente),
 * usamos a distância Haversine entre origem e destino a partir
 * das coordenadas em graus decimais.
 */
function calcPeso(a, origemId, ctx) {
  // ── Bloqueios ──────────────────────────────────────
  // chuva=0 na aresta = via sem rio, sem restrição (nunca alaga)
  // chuva>0 na aresta = nível máximo suportado; fecha se chuva atual supera esse limite
  if (a.chuva > 0 && ctx.chuva > a.chuva)
    return { bloqueado: true, motivo: `Via alaga acima do nível ${a.chuva} de chuva` };
  if (ctx.veiculo === 2 && a.veiculo === 0)
    return { bloqueado: true, motivo: 'Via não permite caminhão' };
  if ([1, 7].includes(ctx.hora) && a.comunidade === 1)
    return { bloqueado: true, motivo: 'Comunidade bloqueada neste horário' };

  // ── Pesos dinâmicos ────────────────────────────────
  const wL = PESO_LARGURA[a.largura] ?? 1;
  const wF = PESO_FLUXO[a.fluxo]    ?? 1;
  const wT = PESO_TIPO[a.tipo]       ?? 1;
  const wC = PESO_CHUVA[ctx.chuva]   ?? 1;
  const wH = PESO_HORA[ctx.hora]     ?? 1;

  // ── Distância Haversine (graus → radianos) ─────────
  const R = 6371008.8;
  const o = grafo[origemId];
  const d = grafo[a.destId];
  let dist = 500; // fallback
  if (o && d) {
    const lat1 = o.lat * Math.PI / 180, lon1 = o.lng * Math.PI / 180;
    const lat2 = d.lat * Math.PI / 180, lon2 = d.lng * Math.PI / 180;
    const dLat = lat2 - lat1, dLon = lon2 - lon1;
    const aa = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    dist = 2 * R * Math.asin(Math.sqrt(aa));
  }

  // ── Fórmula idêntica ao server.py ─────────────────
  const peso = dist * (1*wL + 2*wH + 3*wT + 4*wF + 5*wC) / 15
               * (wL / 10) * (wT / 10);

  return { bloqueado: false, peso, pesoFmt: peso.toFixed(1) + ' m' };
}

document.addEventListener('DOMContentLoaded', () => {
  mapa = L.map('map', { center: [-22.515, -43.185], zoom: 14 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(mapa);

  layerGrafo    = L.layerGroup().addTo(mapa);
  layerAnimacao = L.layerGroup().addTo(mapa);
  layerAnimNos  = L.layerGroup().addTo(mapa);
  layerRota     = L.layerGroup().addTo(mapa);

  setTimeout(() => mapa.invalidateSize(), 200);

  // Coordenadas
  mapa.on('mousemove', (e) => {
    document.getElementById('coord-lat').textContent = e.latlng.lat.toFixed(6);
    document.getElementById('coord-lng').textContent = e.latlng.lng.toFixed(6);
    document.getElementById('coord-display').classList.add('visible');
  });
  mapa.on('mouseout', () => document.getElementById('coord-display').classList.remove('visible'));

  // Canvas chuva
  rainCanvas = document.getElementById('rain-canvas');
  rainCtx    = rainCanvas.getContext('2d');
  const resizeRain = () => {
    const w = document.querySelector('.map-wrap');
    rainCanvas.width = w.offsetWidth; rainCanvas.height = w.offsetHeight;
  };
  resizeRain();
  window.addEventListener('resize', resizeRain);

  atualizarHoraBadge('08:00');
  appPronto = true;
  carregarDados(1);
});

// ═══════════════════════════════════════════════════════
// CARREGAR DADOS
// ═══════════════════════════════════════════════════════
async function carregarDados(tentativa) {
  try {
    showLoader(`Conectando... (${tentativa}/5)`);
    const [rP, rN] = await Promise.all([
      fetch(`${API}/pontos`),
      fetch(`/nos_e_arestas.json`),
    ]);
    if (!rP.ok || !rN.ok) throw new Error('Resposta inválida');
    const pontos  = await rP.json();
    const nosJson = await rN.json();

    grafo = {};
    for (const [id, dados] of Object.entries(nosJson.nos)) {
      grafo[parseInt(id)] = { nome: dados.nome, lat: dados.lat, lng: dados.lon, arestas: [] };
    }
    for (const a of nosJson.arestas) {
      const no   = grafo[a.origem];
      const dest = grafo[a.destino];
      if (no && dest) {
        no.arestas.push({
          destId: a.destino, lat: dest.lat, lng: dest.lon ?? dest.lng,
          rio: a.rio, chuva: a.chuva, largura: a.largura,
          fluxo: a.fluxo, tipo: a.tipo, comunidade: a.comunidade, veiculo: a.veiculo,
        });
      }
    }

    hideLoader();

    ['sel-origem', 'sel-destino'].forEach((id, i) => {
      const sel = document.getElementById(id);
      sel.innerHTML = `<option value="">${i===0?'Selecione a origem...':'Selecione o destino...'}</option>`;
      pontos.forEach(p => sel.add(new Option(`${p} – ${grafo[p]?.nome || 'Ponto '+p}`, p)));
    });

    desenharGrafoBase();
    hideAlert();
  } catch(e) {
    hideLoader();
    if (tentativa < 5) {
      showAlert(`⏳ Aguardando servidor... (${tentativa}/5)`);
      setTimeout(() => carregarDados(tentativa + 1), 2000);
    } else {
      showAlert('❌ Servidor não encontrado. Execute rodar.bat primeiro.');
    }
  }
}

// ═══════════════════════════════════════════════════════
// DESENHAR GRAFO BASE — verde = livre, vermelho = bloqueado
// ═══════════════════════════════════════════════════════
function desenharGrafoBase() {
  layerGrafo.clearLayers();
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const ctx  = getContexto();

  for (const [id, d] of Object.entries(grafo)) {
    const nid = parseInt(id);

    // ── Nó ─────────────────────────────────────────
    L.circleMarker([d.lat, d.lng], {
      radius: 4, color: dark ? '#555' : '#aaa', fillColor: dark ? '#444' : '#ccc',
      fillOpacity: 1, weight: 1,
    }).bindTooltip(`<span style="font-family:var(--mono,monospace);font-size:10px"><b>${id}</b> · ${d.nome}</span>`, {
      direction: 'top', offset: [0,-4],
    }).addTo(layerGrafo);

    // ── Arestas ────────────────────────────────────
    for (const a of d.arestas) {
      const res      = calcPeso(a, nid, ctx);
      const destNome = grafo[a.destId]?.nome || a.destId;
      let cor, peso, opac, dash, ttHtml;

      if (res.bloqueado) {
        // ── BLOQUEADA — vermelho tracejado ──────────
        cor  = dark ? '#f87171' : '#dc2626';
        peso = 2;
        opac = 0.7;
        dash = '5 4';
        const limChuva = a.chuva === 0 ? 'Sem restrição' : `Fecha acima do nível ${a.chuva}`;
        ttHtml = `
          <div class="tt-inner">
            <div class="tt-head blocked">Via Bloqueada</div>
            <div class="tt-motive">${res.motivo}</div>
            <div class="tt-row"><span class="tt-k">Destino</span><span class="tt-v">${destNome}</span></div>
            <div class="tt-row"><span class="tt-k">Resist. chuva</span><span class="tt-v">${limChuva}</span></div>
            <div class="tt-row"><span class="tt-k">Largura</span><span class="tt-v">${LABEL_LARGURA[a.largura]}</span></div>
            <div class="tt-row"><span class="tt-k">Tipo</span><span class="tt-v">${LABEL_TIPO[a.tipo]}</span></div>
            ${a.rio ? `<div class="tt-tag">🌊 Via com rio — fecha no nível ${a.chuva}</div>` : ''}
            ${a.comunidade ? '<div class="tt-tag">⚠ Área de comunidade</div>' : ''}
          </div>`;
      } else {
        // ── LIVRE — verde ───────────────────────────
        cor  = dark ? '#4ade80' : '#16a34a';
        peso = 1.5;
        opac = 0.55;
        dash = null;
        const limChuva = a.chuva === 0 ? 'Sem restrição' : `Fecha acima do nível ${a.chuva}`;
        // Distância desta aresta específica
        const distAresta = (() => {
          const o2 = grafo[nid], d2 = grafo[a.destId];
          if (!o2 || !d2) return '—';
          const R2=6371008.8, la1=o2.lat*Math.PI/180, lo1=o2.lng*Math.PI/180;
          const la2=d2.lat*Math.PI/180, lo2=d2.lng*Math.PI/180;
          const dL=la2-la1, dO=lo2-lo1;
          const aa=Math.sin(dL/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dO/2)**2;
          return (2*R2*Math.asin(Math.sqrt(aa))).toFixed(0)+'m';
        })();
        ttHtml = `
          <div class="tt-inner">
            <div class="tt-head">Via Livre</div>
            <div class="tt-row"><span class="tt-k">Destino</span><span class="tt-v">${destNome}</span></div>
            <div class="tt-row"><span class="tt-k">Peso</span><span class="tt-v accent">${res.pesoFmt}</span></div>
            <div class="tt-row"><span class="tt-k">Distância</span><span class="tt-v">${distAresta}</span></div>
            <div class="tt-row"><span class="tt-k">Largura</span><span class="tt-v">${LABEL_LARGURA[a.largura]}</span></div>
            <div class="tt-row"><span class="tt-k">Tipo</span><span class="tt-v">${LABEL_TIPO[a.tipo]}</span></div>
            <div class="tt-row"><span class="tt-k">Fluxo</span><span class="tt-v">${LABEL_FLUXO[a.fluxo]}</span></div>
            <div class="tt-row"><span class="tt-k">Resist. chuva</span><span class="tt-v">${limChuva}</span></div>
            ${a.rio ? `<div class="tt-tag" style="background:var(--yellow-bg);color:var(--yellow);border-color:color-mix(in srgb,var(--yellow) 25%,transparent)">🌊 Via com rio — fecha no nível ${a.chuva}</div>` : ''}
            ${a.comunidade ? '<div class="tt-tag">⚠ Área de comunidade</div>' : ''}
          </div>`;
      }

      const poly = L.polyline([[d.lat, d.lng], [a.lat, a.lng]], {
        color: cor, weight: peso, opacity: opac, dashArray: dash, interactive: true,
      })
        .bindTooltip(ttHtml, { sticky: true, className: 'tt-wrap' })
        .addTo(layerGrafo);

      if (!res.bloqueado) {
        const corHover = dark ? '#86efac' : '#15803d';
        poly.on('mouseover', function() { this.setStyle({ color: corHover, weight: 2.5, opacity: 1 }); });
        poly.on('mouseout',  function() { this.setStyle({ color: cor, weight: peso, opacity: opac }); });
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// CONTROLES — re-desenha grafo ao mudar parâmetros
// ═══════════════════════════════════════════════════════
function toggleTheme() {
  const root = document.documentElement;
  const dark  = root.getAttribute('data-theme') !== 'dark';
  root.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀' : '☾';
  if (appPronto && Object.keys(grafo).length) desenharGrafoBase();
}

function selectVehicle(v) {
  selectedVehicle = v;
  document.getElementById('v-car').classList.toggle('selected', v === 'car');
  document.getElementById('v-truck').classList.toggle('selected', v === 'truck');
  if (appPronto && Object.keys(grafo).length) desenharGrafoBase();
}

function selectWeather(i) {
  selectedWeather = i;
  for (let j = 0; j < 7; j++)
    document.getElementById('w-'+j).classList.toggle('selected', j === i);
  if (appPronto) updateRain(weatherCfg[i]);
  if (appPronto && Object.keys(grafo).length) desenharGrafoBase();
}

function onHoraChange(v) {
  atualizarHoraBadge(v);
  if (appPronto && Object.keys(grafo).length) desenharGrafoBase();
}

function atualizarHoraBadge(horaStr) {
  const badge = document.getElementById('hora-badge');
  const txt   = document.getElementById('hora-badge-text');
  if (!badge || !horaStr) return;
  const faixa = horaFaixas.find(f => horaStr >= f.inicio && horaStr <= f.fim) || horaFaixas[4];
  badge.setAttribute('data-periodo', faixa.id);
  txt.textContent = faixa.label;
}

// ═══════════════════════════════════════════════════════
// CALCULAR ROTA
// ═══════════════════════════════════════════════════════
async function calcRota() {
  const orig = document.getElementById('sel-origem').value;
  const dest = document.getElementById('sel-destino').value;
  const hora = document.getElementById('hora').value;

  if (!orig || !dest) { showAlert('Selecione origem e destino.'); return; }
  if (orig === dest)  { showAlert('Origem e destino devem ser diferentes.'); return; }

  pararAnimacao();
  layerRota.clearLayers();
  layerAnimacao.clearLayers();
  layerAnimNos.clearLayers();
  if (layerPreview) layerPreview.clearLayers();
  hideAlert();
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('btn-viz').disabled = true;
  document.getElementById('speed-row').style.display = 'none';
  document.getElementById('step-badge').classList.remove('visible');
  document.getElementById('legend').classList.remove('visible');
  ultimoResultado = null;
  showLoader('Calculando rota...');

  try {
    const payload = {
      origem:  orig,
      destino: dest,
      hora,
      chuva:   weatherCfg[selectedWeather].chuvaId,
      veiculo: veiculoId[selectedVehicle],
    };

    const r = await fetch(`${API}/calcular`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const res = await r.json();
    hideLoader();

    if (res.status === 'sem_rota') {
      showAlert('⛔ Nenhuma rota disponível nas condições atuais.');
      ultimoResultado = res;
      return;
    }
    if (res.status === 'erro') {
      showAlert('Erro: ' + (res.mensagem || '?'));
      return;
    }

    ultimoResultado = res;
    desenharRota(res, parseInt(orig), parseInt(dest));
    renderInfo(res, orig, dest, hora);
    document.getElementById('btn-viz').disabled = false;
    document.getElementById('speed-row').style.display = 'flex';
    setTimeout(() => mapa.invalidateSize(), 50);

  } catch(e) {
    hideLoader();
    showAlert('❌ Erro de rede. O servidor ainda está rodando?');
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════
// DESENHAR ROTA
// ═══════════════════════════════════════════════════════
function makePinIcon(cor, letra) {
  return L.divIcon({
    className: '',
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="38" viewBox="0 0 26 38">
      <path d="M13 0C5.8 0 0 5.8 0 13c0 8.5 13 25 13 25S26 21.5 26 13C26 5.8 20.2 0 13 0z"
        fill="${cor}" stroke="white" stroke-width="1.5"/>
      <circle cx="13" cy="13" r="5" fill="white" opacity=".9"/>
      <text x="13" y="17" text-anchor="middle" font-size="7" font-weight="700"
        font-family="sans-serif" fill="${cor}">${letra}</text>
    </svg>`,
    iconSize: [26, 38], iconAnchor: [13, 38], popupAnchor: [0, -40],
  });
}

function desenharRota(res, orig, dest) {
  layerRota.clearLayers();
  let pontos = res.polyline;
  if (!pontos || pontos.length === 0) {
    pontos = (res.caminho || []).filter(id => grafo[id]).map(id => [grafo[id].lat, grafo[id].lng]);
  }
  if (pontos.length < 2) { showAlert('⚠ Sem coordenadas para desenhar.'); return; }

  L.polyline(pontos, { color: '#1850d4', weight: 5, opacity: .9, lineJoin: 'round', lineCap: 'round' }).addTo(layerRota);

  const cA = grafo[orig] ? [grafo[orig].lat, grafo[orig].lng] : pontos[0];
  const cB = grafo[dest] ? [grafo[dest].lat, grafo[dest].lng] : pontos[pontos.length-1];

  L.marker(cA, { icon: makePinIcon('#dc2626', 'A'), zIndexOffset: 1000 })
    .bindPopup(`<b>Origem</b><br>${grafo[orig]?.nome || orig}`).addTo(layerRota);
  L.marker(cB, { icon: makePinIcon('#15803d', 'B'), zIndexOffset: 1000 })
    .bindPopup(`<b>Destino</b><br>${grafo[dest]?.nome || dest}`).addTo(layerRota);

  mapa.fitBounds(L.latLngBounds(pontos), { padding: [50, 50] });
}

// ═══════════════════════════════════════════════════════
// PAINEL INFO
// ═══════════════════════════════════════════════════════
function renderInfo(res, orig, dest, hora) {
  const w      = weatherCfg[selectedWeather];
  const viaOrs = res.polyline && res.polyline.length > 0;

  // Distância: usa o valor calculado pelo server (polyline ORS ou Haversine pelos nós)
  const distM  = res.distancia_m || 0;
  const distKm = distM >= 1000 ? (distM / 1000).toFixed(2) + ' km' : distM.toFixed(0) + ' m';

  // Custo Dijkstra (peso total da rota)
  const custo  = res.custo != null ? res.custo.toFixed(2) : '—';

  const nomeOrig = grafo[orig]?.nome || orig;
  const nomeDest = grafo[dest]?.nome || dest;

  document.getElementById('info-panel').innerHTML = `
    <div class="info-title">${nomeOrig} → ${nomeDest}</div>
    <div class="info-row"><span class="info-label">Saída</span><span class="info-val">${hora}</span></div>
    <div class="info-row"><span class="info-label">Veículo</span><span class="info-val">${selectedVehicle==='car'?'Carro':'Caminhão'}</span></div>
    <div class="info-row"><span class="info-label">Distância</span><span class="info-val">${distKm}</span></div>
    <div class="info-row"><span class="info-label">Custo Dijkstra</span><span class="info-val">${custo}</span></div>
    <div class="info-row"><span class="info-label">Nós no caminho</span><span class="info-val">${res.caminho?.length || 0}</span></div>
    <div class="info-tag ${viaOrs?'ok':'warn'}">${viaOrs?'✓ Rota via OpenRouteService':'⚠ ORS indisponível — rota pelos nós'}</div>
    ${w.alert ? `<div class="info-tag err">${w.alert}</div>` : ''}
  `;
  document.getElementById('info-panel').classList.add('visible');
}

// ═══════════════════════════════════════════════════════
// MODO VISUALIZAÇÃO
// ═══════════════════════════════════════════════════════
function toggleVisualizacao() {
  if (animRunning) { pararAnimacao(); return; }
  iniciarVisualizacao();
}

function iniciarVisualizacao() {
  const caminho = ultimoResultado?.caminho;
  if (!caminho || caminho.length < 2) { showAlert('Sem dados de animação.'); return; }

  layerAnimacao.clearLayers(); layerAnimNos.clearLayers(); layerRota.clearLayers();
  document.getElementById('legend').classList.add('visible');
  document.getElementById('btn-viz').textContent = '◈ Parar';
  document.getElementById('step-badge').classList.add('visible');
  animRunning = true;

  let idx = 0;
  const slider = document.getElementById('speed-slider');

  function passo() {
    if (idx >= caminho.length - 1) { finalizarAnimacao(); return; }
    const u = caminho[idx], v = caminho[idx+1];
    idx++;
    if (!grafo[u] || !grafo[v]) { passo(); return; }

    L.polyline([[grafo[u].lat, grafo[u].lng],[grafo[v].lat, grafo[v].lng]], {
      color: '#f59e0b', weight: 3.5, opacity: .8,
    }).addTo(layerAnimacao);
    L.circleMarker([grafo[u].lat, grafo[u].lng], {
      radius: 4.5, color: '#7c3aed', fillColor: '#8b5cf6', fillOpacity: .85, weight: 1.5,
    }).addTo(layerAnimNos);

    document.getElementById('step-badge').textContent = `${idx} / ${caminho.length-1}`;
    animTimer = setTimeout(passo, 1050 - parseInt(slider.value));
  }
  passo();
}

function finalizarAnimacao() {
  animRunning = false;
  document.getElementById('btn-viz').textContent = '◈ Modo Visualização';
  if (ultimoResultado?.status === 'ok') {
    desenharRota(ultimoResultado,
      parseInt(document.getElementById('sel-origem').value),
      parseInt(document.getElementById('sel-destino').value));
  }
  setTimeout(() => document.getElementById('legend').classList.remove('visible'), 4000);
  document.getElementById('step-badge').textContent = '✓ Concluído';
  setTimeout(() => document.getElementById('step-badge').classList.remove('visible'), 3000);
}

function pararAnimacao() {
  if (animTimer) clearTimeout(animTimer);
  animRunning = false;
  layerAnimacao.clearLayers(); layerAnimNos.clearLayers();
  document.getElementById('btn-viz').textContent = '◈ Modo Visualização';
  document.getElementById('legend').classList.remove('visible');
  document.getElementById('step-badge').classList.remove('visible');
  if (ultimoResultado?.status === 'ok') {
    desenharRota(ultimoResultado,
      parseInt(document.getElementById('sel-origem').value),
      parseInt(document.getElementById('sel-destino').value));
  }
}

// ═══════════════════════════════════════════════════════
// CHUVA ANIMADA
// ═══════════════════════════════════════════════════════
let rainDrops = [];
function updateRain(cfg) {
  cancelAnimationFrame(rainAnim);
  rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
  rainDrops = [];
  if (!cfg.drops) { rainCanvas.classList.remove('active'); return; }
  rainCanvas.classList.add('active');
  for (let i = 0; i < cfg.drops; i++)
    rainDrops.push({ x: Math.random()*rainCanvas.width, y: Math.random()*rainCanvas.height,
      len: 8+Math.random()*14, speed: 4+Math.random()*6 });
  function tick() {
    rainCtx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
    rainCtx.fillStyle = `rgba(80,120,200,${cfg.intensity})`;
    rainCtx.fillRect(0,0,rainCanvas.width,rainCanvas.height);
    rainCtx.strokeStyle='rgba(170,210,255,.5)'; rainCtx.lineWidth=1;
    for (const d of rainDrops) {
      rainCtx.beginPath(); rainCtx.moveTo(d.x,d.y); rainCtx.lineTo(d.x+2,d.y+d.len); rainCtx.stroke();
      d.y += d.speed;
      if (d.y > rainCanvas.height) { d.y = -d.len; d.x = Math.random()*rainCanvas.width; }
    }
    rainAnim = requestAnimationFrame(tick);
  }
  tick();
}

// ═══════════════════════════════════════════════════════
// PREVIEW DE ORIGEM / DESTINO AO SELECIONAR NOS DROPDOWNS
// ═══════════════════════════════════════════════════════
let layerPreview = null;

function onSelecionarPonto() {
  if (!mapa) return;
  if (!layerPreview) { layerPreview = L.layerGroup().addTo(mapa); }
  layerPreview.clearLayers();

  const origId = parseInt(document.getElementById('sel-origem').value);
  const destId = parseInt(document.getElementById('sel-destino').value);

  if (origId && grafo[origId]) {
    const o = grafo[origId];
    L.marker([o.lat, o.lng], { icon: makePinIcon('#dc2626', 'A'), zIndexOffset: 900 })
      .bindTooltip(`<b>Origem:</b> ${o.nome || origId}`, { direction: 'top', offset: [0,-38] })
      .addTo(layerPreview);
  }
  if (destId && grafo[destId]) {
    const d = grafo[destId];
    L.marker([d.lat, d.lng], { icon: makePinIcon('#15803d', 'B'), zIndexOffset: 900 })
      .bindTooltip(`<b>Destino:</b> ${d.nome || destId}`, { direction: 'top', offset: [0,-38] })
      .addTo(layerPreview);
  }

  // Centralizar o mapa nos pontos selecionados
  const pts = [];
  if (origId && grafo[origId]) pts.push([grafo[origId].lat, grafo[origId].lng]);
  if (destId && grafo[destId]) pts.push([grafo[destId].lat, grafo[destId].lng]);
  if (pts.length === 2) mapa.fitBounds(L.latLngBounds(pts), { padding: [80, 80], maxZoom: 15 });
  else if (pts.length === 1) mapa.setView(pts[0], 15);
}

function hideLoader() { document.getElementById('loader').classList.remove('visible'); }
